<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Y2K 디카 & 필름 카메라 — 사진/영상, 필름 프리셋, 아이폰 홈 화면 추가." />

  <title>DICA — Y2K Film Camera</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DICA" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="cam" class="cam">
    <!-- 뷰파인더: video(숨김, 디코딩) → canvas(필터 구워서 표시) -->
    <div class="stage">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="view"></canvas>

      <!-- 상단 HUD -->
      <div class="hud-top">
        <div id="recTimer" class="rec-timer hidden"><i></i><span>0:00</span></div>
      </div>

      <!-- 촬영 플래시 -->
      <div id="flash" class="flash" aria-hidden="true"></div>

      <!-- 줌 다이얼(핀치/드래그 시 등장): 눈금·숫자·중앙 인디케이터 -->
      <div id="zoomDial" class="zoom-dial">
        <div id="dialVal" class="dial-val">1×</div>
        <canvas id="dial" class="dial-canvas"></canvas>
      </div>

      <div class="ver">DICA v13</div>
    </div>

    <!-- 컨트롤 도크: 세로=하단 / 가로=우측 오버레이 -->
    <div class="dock">
      <div class="dock-left">
        <div id="modeSwitch" class="mode-switch">
          <button class="m-btn active" data-mode="photo">PHOTO</button>
          <button class="m-btn" data-mode="video">VIDEO</button>
        </div>

        <!-- 필름 프리셋 휠 + 배율 버튼 (세로=가로나란히 / 가로=세로나열) -->
        <div class="ctrl-mid">
          <div id="presetWheel" class="preset-wheel">
            <div id="pwTrack" class="pw-track"><!-- JS 주입 --></div>
            <div class="pw-marker" aria-hidden="true"></div>
          </div>
          <div id="zoomCluster" class="zoom-cluster"><!-- JS: 0.5×/1×/2×/3× --></div>
        </div>
      </div>

      <div class="shutter-row">
        <button id="galleryBtn" class="round-btn" aria-label="갤러리에서 가져오기">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="3"/><circle cx="8.5" cy="9.5" r="1.6"/><path d="M21 16l-5-5-9 9"/></svg>
        </button>
        <button id="shutter" class="shutter photo" aria-label="촬영"><span class="s-core"></span></button>
        <button id="flipBtn" class="round-btn" aria-label="카메라 전환">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h3l1.5-2h9L18 7h3v12H3z"/><path d="M12 11a3.5 3.5 0 1 0 0 7"/><path d="M9.5 13.5 12 11l2.5 2.5"/></svg>
        </button>
      </div>
    </div>

    <!-- 권한 프라이머 (최초 1회) -->
    <div id="perm" class="perm hidden">
      <div class="perm-card">
        <div class="perm-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h3l1.5-2h9L18 7h3v12H3z"/><circle cx="12" cy="13" r="3.5"/></svg>
        </div>
        <h1>카메라 & 마이크 접근</h1>
        <p>DICA가 사진과 영상을 촬영하려면 카메라와 마이크 권한이 필요해요. 데이터는 기기 밖으로 전송되지 않습니다.</p>
        <button id="permBtn" class="perm-btn">카메라 켜기</button>
        <p id="permErr" class="perm-err" role="alert"></p>
      </div>
    </div>
  </div>

  <!-- 결과 미리보기 -->
  <div id="result" class="result hidden">
    <div class="result-media">
      <img id="resultImg" class="result-img" alt="촬영 결과" hidden />
      <video id="resultVid" class="result-vid" playsinline controls hidden></video>
    </div>
    <div class="result-bar">
      <button id="retakeBtn" class="ghost-btn">다시</button>
      <button id="saveBtn" class="primary-btn">저장</button>
    </div>
    <p id="saveHint" class="save-hint"></p>
  </div>

  <canvas id="shotCanvas" hidden></canvas>
  <input type="file" id="fileInput" accept="image/*" hidden />
  <script src="app.js"></script>
</body>
</html>
